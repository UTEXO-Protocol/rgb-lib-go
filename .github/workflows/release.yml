name: Build and Release

on:
  # Trigger from rgb-lib repository via repository_dispatch
  repository_dispatch:
    types: [rgb-lib-release]

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      rgb_lib_version:
        description: 'rgb-lib version to use (e.g., v0.3.0-beta.4)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  UNIFFI_BINDGEN_GO_TAG: "v0.7.0+v0.31.0"

jobs:
  generate:
    name: Generate Go bindings
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get rgb-lib version
        id: rgb_lib_version
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            RAW_VERSION="${{ github.event.client_payload.version }}"
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            RAW_VERSION="${{ inputs.rgb_lib_version }}"
          fi
          # Ensure v prefix for Go module compatibility
          VERSION="${RAW_VERSION#v}"
          VERSION="v${VERSION}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using rgb-lib version: $VERSION"
        shell: bash

      - name: Clone rgb-lib at release tag
        run: |
          git clone --depth 1 --branch ${{ steps.rgb_lib_version.outputs.version }} \
            https://github.com/UTEXO-Protocol/rgb-lib.git /tmp/rgb-lib
        shell: bash

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uniffi-bindgen-go
        run: |
          cargo install --git https://github.com/NordSecurity/uniffi-bindgen-go \
            --tag "${{ env.UNIFFI_BINDGEN_GO_TAG }}" uniffi-bindgen-go
        shell: bash

      - name: Generate bindings
        working-directory: /tmp/rgb-lib
        run: |
          uniffi-bindgen-go bindings/uniffi/src/rgb-lib.udl \
            --out-dir /tmp/go-bindings \
            --config bindings/uniffi/uniffi.toml

          echo "Generated files:"
          find /tmp/go-bindings -type f

          GO_FILE=$(find /tmp/go-bindings -name "rgb_lib.go" | head -1)
          H_FILE=$(find /tmp/go-bindings -name "rgb_lib.h" | head -1)

          if [ -z "$GO_FILE" ] || [ -z "$H_FILE" ]; then
            echo "ERROR: Generated files not found"
            exit 1
          fi

          cp "$GO_FILE" $GITHUB_WORKSPACE/rgb_lib.go
          cp "$H_FILE" $GITHUB_WORKSPACE/rgb_lib.h
        shell: bash

      - name: Add CGo header
        run: |
          HEADER='/*
          #cgo LDFLAGS: -lrgblibuniffi -L${SRCDIR}/lib -Wl,-rpath,${SRCDIR}/lib
          */
          // #include <rgb_lib.h>'

          TEMP=$(mktemp)
          echo "$HEADER" > "$TEMP"
          cat rgb_lib.go >> "$TEMP"
          mv "$TEMP" rgb_lib.go
        shell: bash

      - name: Download native libraries
        run: |
          mkdir -p lib
          rm -f lib/librgblibuniffi*

          RELEASE_BASE="https://github.com/UTEXO-Protocol/rgb-lib/releases/download/${{ steps.rgb_lib_version.outputs.version }}"

          # Linux x86_64
          curl -L --fail -o /tmp/linux-x64.zip \
            "${RELEASE_BASE}/rgb-lib-uniffi-x86_64-unknown-linux-gnu.zip"
          unzip -o /tmp/linux-x64.zip -d /tmp/linux-x64
          cp /tmp/linux-x64/librgblibuniffi.so lib/librgblibuniffi.so

          # Linux aarch64
          curl -L --fail -o /tmp/linux-arm64.zip \
            "${RELEASE_BASE}/rgb-lib-uniffi-aarch64-unknown-linux-gnu.zip"
          unzip -o /tmp/linux-arm64.zip -d /tmp/linux-arm64
          cp /tmp/linux-arm64/librgblibuniffi.so lib/librgblibuniffi_arm64.so

          # macOS arm64
          curl -L --fail -o /tmp/macos-arm64.zip \
            "${RELEASE_BASE}/rgb-lib-uniffi-aarch64-apple-darwin.zip"
          unzip -o /tmp/macos-arm64.zip -d /tmp/macos-arm64
          cp /tmp/macos-arm64/librgblibuniffi.dylib lib/librgblibuniffi.dylib

          echo "=== Verifying library architectures ==="
          file lib/*
          file lib/librgblibuniffi.so | grep -q "x86-64" || { echo "ERROR: librgblibuniffi.so is not x86-64"; exit 1; }
          file lib/librgblibuniffi_arm64.so | grep -q "aarch64\|ARM aarch64" || { echo "ERROR: librgblibuniffi_arm64.so is not aarch64"; exit 1; }
          file lib/librgblibuniffi.dylib | grep -q "arm64\|aarch64" || { echo "ERROR: librgblibuniffi.dylib is not arm64"; exit 1; }
          echo "All libraries verified OK"
        shell: bash

      - name: Commit updated bindings and libraries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rgb_lib.go rgb_lib.h lib/
          if git diff --cached --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "Auto-generate Go bindings and update native libs from rgb-lib ${{ steps.rgb_lib_version.outputs.version }}"
            git push
          fi
        shell: bash

  build:
    name: Build (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: generate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            lib_name: librgblibuniffi.so
          # macOS ARM64 (Apple Silicon M1/M2/M3)
          - target: aarch64-apple-darwin
            os: macos-latest
            goos: darwin
            goarch: arm64
            lib_name: librgblibuniffi.dylib

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Get rgb-lib version
        id: rgb_lib_version
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.rgb_lib_version }}" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download rgb-lib uniffi library
        run: |
          mkdir -p lib
          DOWNLOAD_URL="https://github.com/UTEXO-Protocol/rgb-lib/releases/download/${{ steps.rgb_lib_version.outputs.version }}/rgb-lib-uniffi-${{ matrix.target }}.zip"
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L -o rgb-lib-uniffi.zip "$DOWNLOAD_URL"
          unzip -o rgb-lib-uniffi.zip -d lib/
          ls -la lib/
        shell: bash

      - name: Fix library path (macOS)
        if: runner.os == 'macOS'
        run: |
          install_name_tool -id @rpath/librgblibuniffi.dylib lib/librgblibuniffi.dylib

      - name: Build and test Go package
        run: |
          export CGO_ENABLED=1
          export CGO_LDFLAGS="-L$(pwd)/lib -lrgblibuniffi"
          go mod tidy
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build ./...
        shell: bash

      - name: Package artifacts
        run: |
          mkdir -p dist/lib
          cp lib/${{ matrix.lib_name }} dist/lib/
          cp rgb_lib.go dist/
          cp rgb_lib.h dist/
          cp go.mod dist/
          cp README.md dist/
          cd dist && zip -r ../rgb-lib-go-${{ matrix.goos }}-${{ matrix.goarch }}.zip .
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rgb-lib-go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rgb-lib-go-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version info
        id: version
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            RGB_LIB_VERSION="${{ github.event.client_payload.version }}"
          else
            RGB_LIB_VERSION="${{ inputs.rgb_lib_version }}"
          fi
          echo "rgb_lib_version=$RGB_LIB_VERSION" >> $GITHUB_OUTPUT
          echo "go_version=$RGB_LIB_VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.go_version }}
          name: Release ${{ steps.version.outputs.go_version }}
          body: |
            ## Go bindings for rgb-lib
            
            Based on rgb-lib ${{ steps.version.outputs.rgb_lib_version }}
            
            ### Installation
            
            ```go
            go get github.com/UTEXO-Protocol/rgb-lib-go@${{ steps.version.outputs.go_version }}
            ```
            
            ### Platforms
            
            - Linux x64 (`linux-amd64`)
            - macOS ARM64 / Apple Silicon (`darwin-arm64`)
            
            ### Changes
            
            See [rgb-lib release notes](https://github.com/UTEXO-Protocol/rgb-lib/releases/tag/${{ steps.version.outputs.rgb_lib_version }})
          draft: false
          prerelease: ${{ contains(steps.version.outputs.go_version, 'alpha') || contains(steps.version.outputs.go_version, 'beta') || contains(steps.version.outputs.go_version, 'rc') }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

